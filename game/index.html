<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>象与骑象人 — 互动叙事游戏</title>
  <script src="../shared/js/canonical-entry.js"></script>
  <link rel="preload" as="image" href="./assets/背景1.jpg">
  <link rel="preload" as="image" href="./assets/游戏界面.jpg">
  <style>
:root {
  --c-el: #E8873A;
  --c-el-bg: #FFF3E0;
  --c-el-light: #FFE0B2;
  --c-ri: #2B5EA7;
  --c-ri-bg: #E3F2FD;
  --c-ri-light: #BBDEFB;
  --c-ha: #4CAF50;
  --c-ha-bg: #E8F5E9;
  --c-ha-light: #C8E6C9;
  --c-bg: #FDF6EC;
  --c-bg-warm: #FFF8E1;
  --c-bg-cool: #E8EAF6;
  --c-txt: #2C2C2C;
  --c-txt2: #666;
  --c-txt3: #999;
  --c-bdr: #E0D5C7;
  --c-wh: #FFF;
  --c-danger: #E53935;
  --ff: "Trebuchet MS", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --ff-serif: Georgia, "Times New Roman", "Songti SC", "STSong", serif;
  --fs: 16px;
  --fs-lg: 18px;
  --fs-xl: 24px;
  --fs-xxl: 28px;
  --fs-sm: 14px;
  --fs-xs: 12px;
  --lh: 1.8;
  --sp-xs: 4px;
  --sp-s: 8px;
  --sp-m: 16px;
  --sp-l: 24px;
  --sp-xl: 32px;
  --r-s: 6px;
  --r-m: 10px;
  --r-l: 16px;
  --r-xl: 24px;
  --sh-s: 0 1px 3px rgba(0,0,0,.06);
  --sh-m: 0 4px 12px rgba(0,0,0,.08);
  --sh-l: 0 8px 24px rgba(0,0,0,.12);
  --tr: .3s ease;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: var(--fs); scroll-behavior: smooth; }
body {
  position: relative;
  font-family: var(--ff);
  font-size: var(--fs);
  line-height: var(--lh);
  color: var(--c-txt);
  background: var(--c-bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  transition: background-color 1s ease;
  isolation: isolate;
}

.hdr {
  text-align: center;
  padding: var(--sp-l) var(--sp-m) var(--sp-m);
  background: var(--c-wh);
  border-bottom: 1px solid var(--c-bdr);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--sh-s);
}
.hdr-top {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-m);
  margin-bottom: var(--sp-m);
}
.start-mode .hdr {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: min(1120px, calc(100% - 24px));
  padding: 0;
  background: transparent;
  border: 0;
  box-shadow: none;
  z-index: 120;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--sp-m);
  pointer-events: none;
}
.start-mode .hdr-top {
  display: none;
}
.start-mode .emotion-panel,
.start-mode .hdr-actions {
  pointer-events: auto;
}
.start-mode .emotion-panel {
  justify-content: flex-start;
  gap: 10px;
  flex-wrap: wrap;
}
.start-mode .emotion-bar {
  display: grid;
  grid-template-columns: auto minmax(48px, 1fr) auto;
  align-items: center;
  gap: 8px;
  min-width: 118px;
  padding: 8px 12px;
  background: rgba(7, 16, 11, 0.26);
  border-color: rgba(243, 235, 221, 0.16);
  box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
  backdrop-filter: blur(6px);
}
.start-mode .bar-label,
.start-mode .bar-val {
  color: rgba(247, 241, 231, 0.92);
}
.start-mode .bar-label {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(243, 235, 221, 0.12);
  color: #3F5A45;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-shadow: 0 1px 12px rgba(0, 0, 0, 0.22);
  white-space: nowrap;
}
.start-mode .bar-track {
  background: rgba(255, 255, 255, 0.14);
  min-width: 52px;
}
.start-mode .hdr-actions {
  justify-content: flex-end;
  flex-shrink: 0;
}
.start-mode .btn-sm {
  background: rgba(7, 16, 11, 0.28);
  color: rgba(248, 242, 232, 0.92);
  border-color: rgba(243, 235, 221, 0.26);
  box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
  backdrop-filter: blur(6px);
}
.start-mode .btn-sm:hover {
  background: rgba(243, 235, 221, 0.14);
  color: #FFF7EC;
  border-color: rgba(243, 235, 221, 0.4);
}
.hdr h1 {
  font-size: var(--fs-xl);
  color: var(--c-el);
  letter-spacing: 2px;
}
.hdr-sub {
  color: var(--c-txt2);
  font-size: var(--fs-sm);
}

.emotion-panel {
  display: flex;
  gap: var(--sp-s);
  justify-content: center;
  flex-wrap: wrap;
}
.emotion-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--r-s);
  font-size: var(--fs-xs);
  font-weight: 500;
  min-width: 120px;
}
.emotion-bar.el { background: var(--c-el-bg); color: #BF6C20; }
.emotion-bar.ri { background: var(--c-ri-bg); color: #1A4A8A; }
.emotion-bar.ha { background: var(--c-ha-bg); color: #2E7D32; }
.emotion-bar .bar-label { white-space: nowrap; }
.emotion-bar .bar-track {
  flex: 1;
  height: 6px;
  background: rgba(0,0,0,.08);
  border-radius: 3px;
  overflow: hidden;
  min-width: 40px;
}
.emotion-bar .bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}
.emotion-bar.el .bar-fill { background: var(--c-el); }
.emotion-bar.ri .bar-fill { background: var(--c-ri); }
.emotion-bar.ha .bar-fill { background: var(--c-ha); }
.emotion-bar .bar-val {
  min-width: 24px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.hdr-actions {
  display: flex;
  gap: var(--sp-s);
  justify-content: center;
  margin-top: var(--sp-s);
}
.btn-sm {
  padding: 3px 10px;
  font-size: var(--fs-xs);
  font-family: var(--ff);
  border: 1px solid var(--c-bdr);
  border-radius: var(--r-s);
  background: var(--c-wh);
  color: var(--c-txt2);
  cursor: pointer;
  transition: all var(--tr);
}
.btn-sm:hover { border-color: var(--c-el); color: var(--c-el); }

.ctn {
  max-width: 720px;
  margin: 0 auto;
  padding: var(--sp-xl) var(--sp-m);
  position: relative;
}
.start-mode .ctn {
  max-width: none;
  width: 100%;
  padding: 0;
}

/* === Forest Progress Bar === */
.forest-progress {
  margin-bottom: var(--sp-l);
  text-align: center;
}
.forest-progress .progress-label {
  font-size: var(--fs-xs);
  color: #6A655B;
  margin-bottom: 10px;
  letter-spacing: 0.08em;
}
.forest-svg {
  width: 100%;
  height: auto;
  border-radius: var(--r-m);
  overflow: hidden;
  background: rgba(247, 243, 235, 0.82);
  border: 1px solid rgba(26, 25, 23, 0.1);
  box-shadow: 0 8px 22px rgba(20, 20, 18, 0.05);
}

.ch-t {
  text-align: center;
  font-size: var(--fs-lg);
  color: var(--c-ri);
  margin-bottom: var(--sp-l);
  padding-bottom: var(--sp-s);
  border-bottom: 2px solid #4A82C7;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.ch-t.visible { opacity: 1; transform: translateY(0); }

.st-t {
  font-size: var(--fs);
  line-height: 2;
  color: var(--c-txt);
  white-space: pre-wrap;
  margin-bottom: var(--sp-xl);
  padding: var(--sp-l) var(--sp-xl);
  background: var(--c-wh);
  border-radius: var(--r-l);
  box-shadow: var(--sh-m);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s;
  cursor: pointer;
  position: relative;
  min-height: 60px;
}
.st-t.visible { opacity: 1; transform: translateY(0); }
.st-t .skip-hint {
  position: absolute;
  bottom: 8px;
  right: 12px;
  font-size: var(--fs-xs);
  color: var(--c-txt3);
  opacity: 0;
  transition: opacity var(--tr);
}
.st-t.typing .skip-hint { opacity: 1; }

.chs {
  display: flex;
  flex-direction: column;
  gap: var(--sp-m);
}
.ch-c {
  padding: var(--sp-m) var(--sp-l);
  background: var(--c-wh);
  border: 2px solid var(--c-bdr);
  border-radius: var(--r-m);
  cursor: pointer;
  transition: all var(--tr);
  font-size: var(--fs);
  line-height: var(--lh);
  color: var(--c-txt);
  text-align: left;
  opacity: 0;
  transform: translateX(-10px);
  position: relative;
  overflow: hidden;
}
.ch-c.visible { opacity: 1; transform: translateX(0); }
.ch-c::before {
  content: '';
  position: absolute;
  top: 0; left: 0; bottom: 0;
  width: 4px;
  transition: width var(--tr);
}
.ch-c.elephant::before { background: var(--c-el); }
.ch-c.rider::before { background: var(--c-ri); }
.ch-c.harmony::before { background: var(--c-ha); }
.ch-c:hover {
  transform: translateY(-2px);
  box-shadow: var(--sh-m);
}
.ch-c.elephant:hover { border-color: var(--c-el); background: var(--c-el-bg); }
.ch-c.rider:hover { border-color: var(--c-ri); background: var(--c-ri-bg); }
.ch-c.harmony:hover { border-color: var(--c-ha); background: var(--c-ha-bg); }
.ch-c:active { transform: translateY(0); }

.end-c {
  text-align: center;
  padding: var(--sp-xl) var(--sp-l);
  border-radius: var(--r-xl);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.end-c.visible { opacity: 1; transform: translateY(0); }
.end-c.end-harmony {
  background: linear-gradient(135deg, #FFF8E1, #E8F5E9);
  border: 2px solid var(--c-ha);
}
.end-c.end-balance {
  background: linear-gradient(135deg, #FFF8E1, #EDE7F6);
  border: 2px solid #8D6E63;
}
.end-c.end-elephant {
  background: linear-gradient(135deg, #FFF3E0, #FFEBEE);
  border: 2px solid var(--c-el);
}
.end-c.end-rider {
  background: linear-gradient(135deg, #E3F2FD, #EDE7F6);
  border: 2px solid var(--c-ri);
}
.end-c .end-icon { font-size: 48px; margin-bottom: var(--sp-m); }
.end-c h2 { margin-bottom: var(--sp-s); font-size: var(--fs-xl); }
.end-c .end-subtitle { color: var(--c-txt2); margin-bottom: var(--sp-m); font-size: var(--fs-sm); }
.end-c .end-text {
  text-align: left;
  white-space: pre-wrap;
  line-height: 2;
  margin-bottom: var(--sp-l);
  padding: var(--sp-m);
  background: rgba(255,255,255,.6);
  border-radius: var(--r-m);
}
.end-c .end-insight {
  text-align: left;
  padding: var(--sp-m);
  background: rgba(255,255,255,.8);
  border-radius: var(--r-m);
  border-left: 4px solid var(--c-ha);
  margin-bottom: var(--sp-l);
  font-size: var(--fs-sm);
  line-height: 1.8;
}
.end-c.end-balance .end-insight { border-left-color: #8D6E63; }
.end-c.end-elephant .end-insight { border-left-color: var(--c-el); }
.end-c.end-rider .end-insight { border-left-color: var(--c-ri); }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-s) var(--sp-xl);
  font-size: var(--fs);
  font-family: var(--ff);
  font-weight: 500;
  border: 2px solid transparent;
  border-radius: var(--r-m);
  cursor: pointer;
  transition: all var(--tr);
  user-select: none;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: var(--c-el);
  color: var(--c-wh);
}
.btn-primary:hover { background: #D07530; }
.btn-outline {
  background: transparent;
  color: var(--c-el);
  border-color: var(--c-el);
}
.btn-outline:hover { background: var(--c-el); color: var(--c-wh); }

/* === Start Screen === */
.start-screen {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  width: 100vw;
  margin-left: calc(50% - 50vw);
  margin-right: calc(50% - 50vw);
  text-align: center;
  padding: clamp(48px, 8vw, 88px) var(--sp-xl);
  overflow: hidden;
  background-image:
    linear-gradient(180deg, rgba(9, 18, 12, 0.12) 0%, rgba(8, 18, 12, 0.24) 42%, rgba(8, 15, 11, 0.44) 100%),
    radial-gradient(circle at 50% 24%, rgba(245, 237, 204, 0.18) 0%, rgba(245, 237, 204, 0.06) 18%, rgba(245, 237, 204, 0) 34%),
    url("./assets/背景1.jpg");
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  box-shadow: inset 0 -96px 136px rgba(6, 10, 8, 0.26);
}
.start-screen::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255, 248, 230, 0.08) 0%, rgba(255, 248, 230, 0.01) 26%),
    radial-gradient(circle at 52% 26%, rgba(255, 248, 220, 0.16), rgba(255, 248, 220, 0) 30%);
  -webkit-backdrop-filter: saturate(1.08) contrast(1.06) brightness(1.03);
  backdrop-filter: saturate(1.08) contrast(1.06) brightness(1.03);
  mix-blend-mode: screen;
  pointer-events: none;
}
.start-screen > * {
  position: relative;
  z-index: 1;
}
.start-screen .start-icon {
  display: none;
}
.start-screen .start-title {
  font-family: var(--ff-serif);
  font-size: var(--fs-xxl);
  color: #F6F0E3;
  margin-bottom: var(--sp-m);
  letter-spacing: 0.08em;
  font-weight: 700;
  text-shadow: 0 2px 20px rgba(0, 0, 0, 0.35);
}
.start-screen .start-desc {
  font-family: var(--ff);
  color: rgba(247, 242, 232, 0.92);
  max-width: 520px;
  margin-bottom: var(--sp-xl);
  line-height: 1.8;
  text-shadow: 0 2px 18px rgba(0, 0, 0, 0.28);
}
.start-screen .start-btns {
  display: flex;
  flex-direction: column;
  gap: var(--sp-m);
  width: 220px;
}
.start-screen .start-tip {
  font-family: var(--ff);
  margin-top: var(--sp-xl);
  font-size: var(--fs-xs);
  color: rgba(240, 234, 223, 0.78);
  max-width: 420px;
  text-shadow: 0 1px 12px rgba(0, 0, 0, 0.28);
}
.start-screen .btn {
  font-family: var(--ff);
  font-weight: 700;
  letter-spacing: 0.02em;
}
.start-screen .btn-primary {
  background: rgba(202, 136, 74, 0.92);
  border-color: rgba(202, 136, 74, 0.92);
  box-shadow: 0 8px 24px rgba(31, 24, 14, 0.24);
}
.start-screen .btn-primary:hover {
  background: rgba(214, 149, 86, 0.96);
}
.start-screen.start-animate .start-title,
.start-screen.start-animate .start-desc,
.start-screen.start-animate .start-btns,
.start-screen.start-animate .start-tip {
  animation-fill-mode: both;
}
.start-screen.start-animate .start-title {
  animation: startFadeLift 1.05s cubic-bezier(0.22, 1, 0.36, 1);
}
.start-screen.start-animate .start-desc {
  animation: startFadeLift 1.05s cubic-bezier(0.22, 1, 0.36, 1) 0.18s;
}
.start-screen.start-animate .start-btns {
  animation: startFadeLift 0.95s cubic-bezier(0.22, 1, 0.36, 1) 0.36s;
}
.start-screen.start-animate .start-tip {
  animation: startFadeLift 0.95s cubic-bezier(0.22, 1, 0.36, 1) 0.5s;
}
.start-screen.start-animate .btn-primary {
  animation:
    startButtonBloom 1.1s cubic-bezier(0.2, 0.9, 0.25, 1) 0.42s both,
    startButtonBreath 3.2s ease-in-out 1.7s infinite;
}
.start-screen .btn-primary {
  transform-origin: center;
}
.start-screen .btn-primary:hover {
  transform: translateY(-1px);
}
.start-screen .btn-primary:active {
  transform: scale(0.98);
}
.start-screen .btn-outline {
  color: #F3EBDD;
  border-color: rgba(243, 235, 221, 0.72);
  background: rgba(8, 17, 12, 0.12);
  backdrop-filter: blur(3px);
}
.start-screen .btn-outline:hover {
  background: rgba(243, 235, 221, 0.16);
  color: #FFF8EE;
  border-color: rgba(243, 235, 221, 0.88);
}

@keyframes startFadeLift {
  0% {
    opacity: 0;
    transform: translateY(22px) scale(0.985);
    filter: blur(8px);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

@keyframes startButtonBloom {
  0% {
    opacity: 0;
    transform: translateY(18px) scale(0.92);
    box-shadow: 0 0 0 rgba(31, 24, 14, 0);
  }
  70% {
    opacity: 1;
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 18px 38px rgba(31, 24, 14, 0.28);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
    box-shadow: 0 8px 24px rgba(31, 24, 14, 0.24);
  }
}

@keyframes startButtonBreath {
  0%, 100% {
    box-shadow: 0 8px 24px rgba(31, 24, 14, 0.24);
  }
  50% {
    box-shadow: 0 14px 32px rgba(31, 24, 14, 0.32);
  }
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,.75);
  color: #fff;
  padding: 10px 24px;
  border-radius: var(--r-m);
  font-size: var(--fs-sm);
  opacity: 0;
  transition: all .3s ease;
  z-index: 999;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

body:not(.start-mode) {
  background: #DEE6D8;
}

body:not(.start-mode)::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  background-image:
    linear-gradient(180deg, rgba(16, 31, 22, 0.18) 0%, rgba(16, 31, 22, 0.08) 18%, rgba(16, 31, 22, 0.2) 100%),
    radial-gradient(circle at 50% 18%, rgba(241, 236, 214, 0.2) 0%, rgba(241, 236, 214, 0.08) 18%, rgba(241, 236, 214, 0) 36%),
    url("./assets/游戏界面.jpg");
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  transform-origin: center center;
  animation: forestBreath 15s ease-in-out infinite alternate;
}

body:not(.start-mode)::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 16%, rgba(255, 250, 236, 0.18) 0%, rgba(255, 250, 236, 0.08) 20%, rgba(255, 250, 236, 0) 42%),
    radial-gradient(circle at 20% 58%, rgba(230, 237, 227, 0.16) 0%, rgba(230, 237, 227, 0.05) 20%, rgba(230, 237, 227, 0) 42%),
    radial-gradient(circle at 82% 62%, rgba(226, 235, 224, 0.14) 0%, rgba(226, 235, 224, 0.04) 18%, rgba(226, 235, 224, 0) 40%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(232, 238, 230, 0.08) 48%, rgba(220, 229, 218, 0.12) 100%);
  mix-blend-mode: screen;
  animation: mistBreath 8.5s ease-in-out infinite alternate;
}

@keyframes forestBreath {
  0% {
    transform: scale(1);
    filter: saturate(1.02) brightness(0.98);
  }
  100% {
    transform: scale(1.035);
    filter: saturate(1.06) brightness(1.03);
  }
}

@keyframes mistBreath {
  0% {
    opacity: 0.72;
    transform: scale(1) translateY(0);
  }
  100% {
    opacity: 1;
    transform: scale(1.03) translateY(-8px);
  }
}

body:not(.start-mode) .hdr {
  width: min(1120px, calc(100% - 24px));
  margin: 14px auto 0;
  padding: 18px 22px 16px;
  background:
    radial-gradient(circle at 84% 18%, rgba(255, 248, 231, 0.14), transparent 24%),
    rgba(244, 248, 241, 0.76);
  border: 1px solid rgba(232, 225, 212, 0.62);
  border-radius: 30px 36px 28px 40px / 28px 36px 38px 26px;
  box-shadow: 0 18px 40px -26px rgba(25, 38, 28, 0.28);
  backdrop-filter: blur(10px);
}

body:not(.start-mode) .hdr h1 {
  color: #4F6447;

var Storage = (function() {
  var PREFIX = 'elephant_rider_';
  function save(k, v) {
    try { localStorage.setItem(PREFIX + k, JSON.stringify(v)); return true; }
    catch(e) { return false; }
  }
  function load(k) {
    try { var d = localStorage.getItem(PREFIX + k); return d === null ? null : JSON.parse(d); }
    catch(e) { return null; }
  }
  function remove(k) {
    try { localStorage.removeItem(PREFIX + k); return true; }
    catch(e) { return false; }
  }
  return {
    save: save,
    load: load,
    remove: remove,
    hasSave: function() { return load('save') !== null; },
    saveGame: function(state) { return save('save', state); },
    loadGame: function() { return load('save'); },
    deleteSave: function() { return remove('save'); }
  };
})();
  </script>

  <script>
var EmotionTracker = (function() {
  var elephantPower = 50;
  var riderControl = 50;
  var harmonyLevel = 50;

  function getBalanceGap() {
    return Math.abs(elephantPower - riderControl);
  }

  function getHarmony() {
    return harmonyLevel;
  }

  function getLegacyHarmonyFromBalance() {
    return clamp(100 - getBalanceGap());
  }

  function getState() {
    return {
      elephantPower: elephantPower,
      riderControl: riderControl,
      harmony: getHarmony(),
      scoreVersion: 2
    };
  }

  function clamp(v) {
    return Math.max(0, Math.min(100, v));
  }

  function update(type, impact) {
    var amount = typeof impact === 'number' ? impact : 0;

    if (type === 'elephant') {
      elephantPower = clamp(elephantPower + amount);
      harmonyLevel = clamp(harmonyLevel - Math.max(2, Math.round(amount * 0.7)));
    } else if (type === 'rider') {
      riderControl = clamp(riderControl + amount);
      harmonyLevel = clamp(harmonyLevel - Math.max(2, Math.round(amount * 0.7)));
    } else if (type === 'harmony') {
      harmonyLevel = clamp(harmonyLevel + amount);
    }
    return getState();
  }

  function reset() {
    elephantPower = 50;
    riderControl = 50;
    harmonyLevel = 50;
  }

  function setState(s) {
    elephantPower = typeof s.elephantPower === 'number' ? s.elephantPower : 50;
    riderControl = typeof s.riderControl === 'number' ? s.riderControl : 50;
    harmonyLevel = s.scoreVersion === 2 && typeof s.harmony === 'number'
      ? clamp(s.harmony)
      : getLegacyHarmonyFromBalance();
  }

  function getEndingType() {
    var diff = elephantPower - riderControl;
    var gap = Math.abs(diff);

    if (gap <= 8 && harmonyLevel >= 85 && elephantPower <= 60 && riderControl <= 60) return 'harmony';
    if (gap <= 18) return 'balance';
    if (diff > 0) return 'elephant';
    return 'rider';
  }

  return {
    update: update,
    getState: getState,
    getHarmony: getHarmony,
    reset: reset,
    setState: setState,
    getEndingType: getEndingType
  };
})();
  </script>

  <script>
var Engine = (function() {
  var currentNode = null;
  var callbacks = [];
  var choiceHistory = [];

  function loadNode(nodeId) {
    if (!nodeId) return null;
    if (nodeId === 'ending_router') {
      var endingType = EmotionTracker.getEndingType();
      var endingId = 'ending_' + endingType;
      return loadNode(endingId);
    }
    var node = StoryData.nodes[nodeId];
    if (!node) {
      console.error('Node not found:', nodeId);
      return null;
    }
    return JSON.parse(JSON.stringify(node));
  }

  function goToNode(nodeId) {
    var node = loadNode(nodeId);
    if (!node) {
      console.error('Failed to go to node:', nodeId);
      return false;
    }
    currentNode = node;
    for (var i = 0; i < callbacks.length; i++) {
      callbacks[i](currentNode);
    }
    return true;
  }

  function makeChoice(optionIndex) {
    if (!currentNode || !currentNode.options || !currentNode.options[optionIndex]) {
      console.error('Invalid choice:', optionIndex);
      return false;
    }
    var option = currentNode.options[optionIndex];
    choiceHistory.push({
      nodeId: currentNode.id,
      optionIndex: optionIndex,
      optionText: option.text,
      optionType: option.type,
      emotionImpact: option.emotionImpact
    });
    EmotionTracker.update(option.type, option.emotionImpact);
    autoSave();
    return goToNode(option.nextNodeId);
  }

  function autoSave() {
    var state = {
      nodeId: currentNode ? currentNode.id : 'chapter1_node1',
      emotion: EmotionTracker.getState(),
      choiceHistory: choiceHistory.slice(),
      timestamp: Date.now()
    };
    Storage.saveGame(state);
  }

  function loadSave() {
    var state = Storage.loadGame();
    if (!state) return false;
    EmotionTracker.setState(state.emotion);
    choiceHistory = state.choiceHistory || [];
    return goToNode(state.nodeId);
  }

  return {
    goToNode: goToNode,
    getCurrentNode: function() { return currentNode; },
    onNodeChange: function(cb) { if (typeof cb === 'function') callbacks.push(cb); },
    makeChoice: makeChoice,
    getChoiceHistory: function() { return choiceHistory.slice(); },
    start: function(startId) {
      choiceHistory = [];
      EmotionTracker.reset();
      Storage.deleteSave();
      return goToNode(startId || 'chapter1_node1');
    },
    loadSave: loadSave,
    hasSave: function() { return Storage.hasSave(); },
    save: autoSave
  };
})();
  </script>

  <script>
(function() {
  function preloadImage(src) {
    var image = new Image();
    image.decoding = 'async';
    image.src = src;
    return image;
  }

  preloadImage('./assets/背景1.jpg');
  preloadImage('./assets/游戏界面.jpg');

  var startScreen = document.getElementById('start-screen');
  var gameScreen = document.getElementById('game-screen');
  var chapterTitle = document.getElementById('chapter-title');
  var storyText = document.getElementById('story-text');
  var choicesContainer = document.getElementById('choices');
  var progressText = document.getElementById('progress-text');
  var progressElephant = document.getElementById('progress-elephant');
  var barEl = document.getElementById('bar-el');
  var barRi = document.getElementById('bar-ri');
  var barHa = document.getElementById('bar-ha');
  var valEl = document.getElementById('val-el');
  var valRi = document.getElementById('val-ri');
  var valHa = document.getElementById('val-ha');
  var btnSave = document.getElementById('btn-save');
  var btnRestart = document.getElementById('btn-restart');
  var btnNew = document.getElementById('btn-new');
  var btnContinue = document.getElementById('btn-continue');
  var toastEl = document.getElementById('toast');

  var TOTAL_CHAPTERS = 5;
  var typewriterTimer = null;
  var isTyping = false;
  var progressAnimFrame = null;

  var chapterPositions = {
    1: { x: 80, y: 58 },
    2: { x: 240, y: 54 },
    3: { x: 400, y: 63 },
    4: { x: 560, y: 52 },
    5: { x: 720, y: 54 },
    6: { x: 784, y: 60 }
  };

  function animateProgressElephant(targetPoint) {
    if (progressAnimFrame) cancelAnimationFrame(progressAnimFrame);
    var currentTransform = progressElephant.getAttribute('transform') || 'translate(80, 58)';
    var match = currentTransform.match(/translate\(\s*([0-9.]+)\s*,\s*([0-9.]+)\s*\)/);
    var startX = match ? parseFloat(match[1]) : 80;
    var startY = match ? parseFloat(match[2]) : 58;
    var startTime = null;
    var duration = 800;

    function step(timestamp) {
      if (!startTime) startTime = timestamp;
      var progress = Math.min((timestamp - startTime) / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 3);
      var x = startX + (targetPoint.x - startX) * eased;
      var baseY = startY + (targetPoint.y - startY) * eased;
      var motionLift = Math.sin(progress * Math.PI) * 2.4;
      var y = baseY - motionLift;
      progressElephant.setAttribute('transform', 'translate(' + x + ', ' + y + ')');
      if (progress < 1) {
        progressAnimFrame = requestAnimationFrame(step);
      }
    }
    progressAnimFrame = requestAnimationFrame(step);
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function() { toastEl.classList.remove('show'); }, 2000);
  }

  function getChapterNumber(nodeId) {
    if (nodeId.indexOf('ending_') === 0) return TOTAL_CHAPTERS + 1;
    var match = nodeId.match(/chapter(\d+)_/);
    return match ? parseInt(match[1]) : 1;
  }

  function updateProgress(nodeId) {
    var ch = getChapterNumber(nodeId);
    if (nodeId.indexOf('ending_') === 0) {
      progressText.textContent = '终章';
      animateProgressElephant(chapterPositions[6]);
    } else {
      progressText.textContent = '第 ' + ch + ' 章 / 共 ' + TOTAL_CHAPTERS + ' 章';
      animateProgressElephant(chapterPositions[ch] || chapterPositions[1]);
    }
  }

  function updateEmotionBars() {
    var state = EmotionTracker.getState();
    barEl.style.width = state.elephantPower + '%';
    barRi.style.width = state.riderControl + '%';
    barHa.style.width = state.harmony + '%';
    valEl.textContent = Math.round(state.elephantPower);
    valRi.textContent = Math.round(state.riderControl);
    valHa.textContent = Math.round(state.harmony);
  }

  function updateBackground() {
    var harmony = EmotionTracker.getHarmony();
    if (harmony >= 70) {
      document.body.style.backgroundColor = '#FFF8E1';
    } else if (harmony >= 40) {
      document.body.style.backgroundColor = '#FDF6EC';
    } else {
      document.body.style.backgroundColor = '#E8EAF6';
    }
  }

  function typeText(text, element, callback) {
    if (typewriterTimer) {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
    }
    isTyping = true;
    element.classList.add('typing');
    element.textContent = '';
    var skipHint = element.querySelector('.skip-hint');
    if (!skipHint) {
      skipHint = document.createElement('span');
      skipHint.className = 'skip-hint';
      skipHint.textContent = '点击跳过';
      element.appendChild(skipHint);
    }
    skipHint.style.display = '';

    var i = 0;
    var speed = 25;
    typewriterTimer = setInterval(function() {
      if (i < text.length) {
        element.insertBefore(document.createTextNode(text[i]), skipHint);
        i++;
      } else {
        clearInterval(typewriterTimer);
        typewriterTimer = null;
        isTyping = false;
        element.classList.remove('typing');
        skipHint.style.display = 'none';
        if (callback) callback();
      }
    }, speed);
  }

  function skipTypewriter(element, text) {
    if (typewriterTimer) {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
    }
    isTyping = false;
    element.classList.remove('typing');
    var skipHint = element.querySelector('.skip-hint');
    if (skipHint) skipHint.style.display = 'none';
    element.textContent = text;
  }

  storyText.addEventListener('click', function() {
    if (isTyping && currentNode) {
      skipTypewriter(storyText, currentNode.text);
    }
  });

  var currentNode = null;

  function renderNode(node) {
    currentNode = node;
    chapterTitle.textContent = node.chapter;
    choicesContainer.innerHTML = '';
    updateProgress(node.id);
    updateEmotionBars();
    updateBackground();

    chapterTitle.classList.remove('visible');
    storyText.classList.remove('visible');
    storyText.style.display = '';

    setTimeout(function() { chapterTitle.classList.add('visible'); }, 50);
    setTimeout(function() { storyText.classList.add('visible'); }, 150);

    if (node.endingType) {
      renderEnding(node);
      return;
    }

    typeText(node.text, storyText);

    if (!node.options || node.options.length === 0) return;

    for (var i = 0; i < node.options.length; i++) {
      (function(idx) {
        var option = node.options[idx];
        var choiceDiv = document.createElement('div');
        choiceDiv.className = 'ch-c ' + option.type;
        var textDiv = document.createElement('div');
        textDiv.textContent = option.text;
        choiceDiv.appendChild(textDiv);
        choiceDiv.addEventListener('click', function() {
          Engine.makeChoice(idx);
        });
        choicesContainer.appendChild(choiceDiv);

        setTimeout(function() {
          choiceDiv.classList.add('visible');
        }, 300 + idx * 100);
      })(i);
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderEnding(node) {
    storyText.textContent = '';
    storyText.style.display = 'none';

    var endDiv = document.createElement('div');
    endDiv.className = 'end-c end-' + node.endingType;

    var icon = document.createElement('div');
    icon.className = 'end-icon';
    icon.textContent = node.endingIcon;

    var title = document.createElement('h2');
    title.textContent = node.endingTitle;

    var subtitle = document.createElement('div');
    subtitle.className = 'end-subtitle';
    subtitle.textContent = node.endingSubtitle;

    var text = document.createElement('div');
    text.className = 'end-text';
    text.textContent = node.endingText;

    var insight = document.createElement('div');
    insight.className = 'end-insight';
    insight.textContent = node.endingInsight;

    var btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:12px;justify-content:center;flex-wrap:wrap;';

    var btnAgent = document.createElement('button');
    btnAgent.className = 'btn btn-secondary';
    btnAgent.textContent = '进入情绪助手';
    btnAgent.addEventListener('click', function() {
      window.location.href = '../agent/index.html?from=game&ending=' + encodeURIComponent(node.endingType);
    });

    var btnRestart2 = document.createElement('button');
    btnRestart2.className = 'btn btn-primary';
    btnRestart2.textContent = '重新开始';
    btnRestart2.addEventListener('click', function() {
      document.body.classList.add('start-mode');
      startScreen.style.display = '';
      playStartReveal();
      gameScreen.style.display = 'none';
      Engine.start();
    });

    btnRow.appendChild(btnAgent);
    btnRow.appendChild(btnRestart2);

    endDiv.appendChild(icon);
    endDiv.appendChild(title);
    endDiv.appendChild(subtitle);
    endDiv.appendChild(text);
    endDiv.appendChild(insight);
    endDiv.appendChild(btnRow);
    choicesContainer.appendChild(endDiv);

    setTimeout(function() { endDiv.classList.add('visible'); }, 300);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showGame() {
    document.body.classList.remove('start-mode');
    startScreen.style.display = 'none';
    gameScreen.style.display = '';
  }

  function playStartReveal() {
    startScreen.classList.remove('start-animate');
    void startScreen.offsetWidth;
    startScreen.classList.add('start-animate');
  }

  btnNew.addEventListener('click', function() {
    if (Storage.hasSave()) {
      if (!confirm('开始新游戏将覆盖已有存档，确定吗？')) return;
    }
    showGame();
    Engine.start();
  });

  btnContinue.addEventListener('click', function() {
    showGame();
    Engine.loadSave();
  });

  btnSave.addEventListener('click', function() {
    Engine.save();
    showToast('存档成功！');
  });

  btnRestart.addEventListener('click', function() {
    if (confirm('确定要重新开始吗？当前进度将会丢失。')) {
      document.body.classList.add('start-mode');
      startScreen.style.display = '';
      playStartReveal();
      gameScreen.style.display = 'none';
      Engine.start();
      Engine.start();
      showToast('已重新开始');
    }
  });

  if (Storage.hasSave()) {
    btnContinue.style.display = '';
  }

  if (startScreen.style.display !== 'none') {
    document.body.classList.add('start-mode');
    playStartReveal();
  }

  Engine.onNodeChange(renderNode);
})();
  </script>
</body>
</html>
